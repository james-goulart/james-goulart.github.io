<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>James Goulart - AI Product Leader</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <link rel="stylesheet" href="./experience-enhancements.css" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
  </head>
  <body>
    <header id="site-nav" class="site-nav" aria-label="Primary"></header>
    <main id="main" class="page"></main>
    <script src="./data.js"></script>
    <script src="./portfolio.js"></script>
    <script src="./experience-page-meta.js"></script>
    <script src="./experience-page-helpers.js"></script>
    <script src="./experience-page-render.js"></script>
    <script>
      function go() {
        var id = decodeURIComponent((location.hash || "#").slice(1));
        var active = id ? "exp-" + id : "experiences";
        Portfolio.injectNav(document.getElementById("site-nav"), active);
        if (id) {
          Portfolio.renderExperience(document.getElementById("main"));
        } else {
          Portfolio.renderExperiencesIndex(document.getElementById("main"));
        }
        var t = document.querySelector("title");
        if (t) t.textContent = "James Goulart - AI Product Leader";
      }
      document.addEventListener("DOMContentLoaded", go);
      window.addEventListener("hashchange", go);
    </script>
  </body>
</html>
