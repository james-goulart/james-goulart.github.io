<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Experience — James Goulart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header id="site-nav" class="site-nav" aria-label="Primary"></header>
    <main id="main" class="page"></main>
    <script src="./data.js"></script>
    <script src="./portfolio.js"></script>
    <script>
      function go() {
        var id = decodeURIComponent((location.hash || "#").slice(1));
        var active = id ? "exp-" + id : "experiences";
        Portfolio.injectNav(document.getElementById("site-nav"), active);
        if (id) {
          Portfolio.renderExperience(document.getElementById("main"));
        } else {
          Portfolio.renderExperiencesIndex(document.getElementById("main"));
        }
        var t = document.querySelector("title");
        if (id && Portfolio.DATA) {
          var exp = Portfolio.DATA.experiences.find(function (e) {
            return e.id === id;
          });
          if (exp && t) t.textContent = exp.company + " — " + exp.role;
        } else if (t) {
          t.textContent = "Experiences — James Goulart";
        }
      }
      document.addEventListener("DOMContentLoaded", go);
      window.addEventListener("hashchange", go);
    </script>
  </body>
</html>
